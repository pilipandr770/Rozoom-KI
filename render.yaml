# render.yaml
services:
  # Cron job РґР»СЏ РѕР±СЂР°Р±РѕС‚РєРё РѕС‡РµСЂРµРґРё Telegram СЃРѕРѕР±С‰РµРЅРёР№
  - type: cron
    name: telegram-queue-processor
    runtime: python
    schedule: "*/5 * * * *"  # Р—Р°РїСѓСЃРє РєР°Р¶РґС‹Рµ 5 РјРёРЅСѓС‚
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/process_telegram_queue.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DATABASE_URL
        fromDatabase:
          name: andrii-it-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false # Sensitive - must be set manually in Render dashboard
      
  # РћСЃРЅРѕРІРЅРѕР№ РІРµР±-СЃРµСЂРІРёСЃ
  - type: web
    name: andrii-pylypchuk
    runtime: python
    plan: starter # РСЃРїРѕР»СЊР·СѓР№С‚Рµ СЃРѕРѕС‚РІРµС‚СЃС‚РІСѓСЋС‰РёР№ С‚Р°СЂРёС„РЅС‹Р№ РїР»Р°РЅ
    buildCommand: pip install -r requirements.txt && pybabel compile -d app/translations
    startCommand: gunicorn -c gunicorn_config.py run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DATABASE_URL
        fromDatabase:
          name: andrii-pylypchuk-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_SCHEMA
        value: andrii_pylypchuk_schema
      - key: POSTGRES_SCHEMA_CLIENTS
        value: andrii_pylypchuk_clients
      - key: POSTGRES_SCHEMA_SHOP
        value: rozoom_ki_shop
      - key: POSTGRES_SCHEMA_PROJECTS
        value: rozoom_ki_projects
      - key: OPENAI_API_KEY
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: OPENAI_MODEL_FALLBACK
        value: gpt-4o-mini
      - key: USE_CHAT_COMPLETION
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: STRIPE_TEST_PRICE_ID
        sync: false # Sensitive - must be set manually in Render dashboard
      - key: CALENDAR_API_KEY
        sync: false # Sensitive - must be set manually in Render dashboard
    healthCheckPath: /health

# Р‘Р°Р·Р° РґР°РЅРЅС‹С… PostgreSQL
databases:
  - name: andrii-it-db
    plan: starter # РСЃРїРѕР»СЊР·СѓР№С‚Рµ СЃРѕРѕС‚РІРµС‚СЃС‚РІСѓСЋС‰РёР№ С‚Р°СЂРёС„РЅС‹Р№ РїР»Р°РЅ
    databaseName: rozoom_ki_database
    user: rozoom_ki_user
    ipAllowList: # РћРїС†РёРѕРЅР°Р»СЊРЅРѕ - РѕРіСЂР°РЅРёС‡РµРЅРёРµ РґРѕСЃС‚СѓРїР° РїРѕ IP
      - source: 0.0.0.0/0
        description: everywhere

