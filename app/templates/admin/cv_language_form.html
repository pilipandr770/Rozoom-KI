{% extends 'admin/base.html' %}
{% block title %}Sprache bearbeiten — CV{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
  <h1 class="h4 text-light">Sprache bearbeiten</h1>
  <a href="{{ url_for('admin.cv_dashboard') }}#languages" class="btn btn-outline-secondary btn-sm">← Zurück</a>
</div>
<div class="content-card">
  <div class="card-body">
    <form method="post">
      {{ csrf_field() }}
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label text-muted">Sprache *</label>
          <input name="language" value="{{ lang.language }}" required class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-3">
          <label class="form-label text-muted">Niveau</label>
          <input name="level" value="{{ lang.level }}" class="form-control bg-dark text-light border-secondary" placeholder="C1 / Muttersprache / B2">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Balken % (0-100)</label>
          <input name="level_percent" type="number" min="0" max="100" value="{{ lang.level_percent }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Reihenfolge</label>
          <input name="order_idx" type="number" value="{{ lang.order_idx }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Speichern</button>
          <a href="{{ url_for('admin.cv_dashboard') }}#languages" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
