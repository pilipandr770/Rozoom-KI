{% extends 'admin/base.html' %}
{% block title %}Zertifikat {% if cert %}bearbeiten{% else %}hinzufügen{% endif %} — CV{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
  <h1 class="h4 text-light">Zertifikat {% if cert %}bearbeiten{% else %}hinzufügen{% endif %}</h1>
  <a href="{{ url_for('admin.cv_dashboard') }}#certifications" class="btn btn-outline-secondary btn-sm">← Zurück</a>
</div>
<div class="content-card">
  <div class="card-body">
    <form method="post">
      {{ csrf_field() }}
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label text-muted">Name des Zertifikats *</label>
          <input name="name" value="{{ cert.name if cert else '' }}" required class="form-control bg-dark text-light border-secondary" placeholder="AWS Certified Developer">
        </div>
        <div class="col-md-4">
          <label class="form-label text-muted">Aussteller</label>
          <input name="issuer" value="{{ cert.issuer if cert else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="Amazon / Coursera …">
        </div>
        <div class="col-md-3">
          <label class="form-label text-muted">Datum</label>
          <input name="date" value="{{ cert.date if cert else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="März 2024">
        </div>
        <div class="col-md-7">
          <label class="form-label text-muted">URL / Nachweis-Link</label>
          <input name="url" value="{{ cert.url if cert else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="https://…">
        </div>
        <div class="col-12">
          <label class="form-label text-muted">Beschreibung (optional)</label>
          <textarea name="description" rows="3" class="form-control bg-dark text-light border-secondary">{{ cert.description if cert else '' }}</textarea>
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Reihenfolge</label>
          <input name="order_idx" type="number" value="{{ cert.order_idx if cert else 0 }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Speichern</button>
          <a href="{{ url_for('admin.cv_dashboard') }}#certifications" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
