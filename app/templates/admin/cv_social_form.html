{% extends 'admin/base.html' %}
{% block title %}Social Link bearbeiten — CV{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
  <h1 class="h4 text-light">Social Link bearbeiten</h1>
  <a href="{{ url_for('admin.cv_dashboard') }}#social" class="btn btn-outline-secondary btn-sm">← Zurück</a>
</div>
<div class="content-card">
  <div class="card-body">
    <form method="post">
      {{ csrf_field() }}
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label text-muted">Plattform *</label>
          <input name="platform" value="{{ link.platform }}" required class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-5">
          <label class="form-label text-muted">URL *</label>
          <input name="url" type="url" value="{{ link.url }}" required class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Icon (FA class)</label>
          <input name="icon_class" value="{{ link.icon_class }}" class="form-control bg-dark text-light border-secondary" placeholder="fab fa-linkedin">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Anzeigename</label>
          <input name="display_name" value="{{ link.display_name }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-1">
          <label class="form-label text-muted">Reihenf.</label>
          <input name="order_idx" type="number" value="{{ link.order_idx }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Speichern</button>
          <a href="{{ url_for('admin.cv_dashboard') }}#social" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
