{% extends 'admin/base.html' %}
{% block title %}{% if proj %}Projekt bearbeiten{% else %}Projekt hinzufügen{% endif %} — CV{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
  <h1 class="h4 text-light">{% if proj %}Projekt bearbeiten{% else %}Neues Projekt{% endif %}</h1>
  <a href="{{ url_for('admin.cv_dashboard') }}#projects" class="btn btn-outline-secondary btn-sm">← Zurück</a>
</div>
<div class="content-card">
  <div class="card-body">
    <form method="post">
      {{ csrf_field() }}
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label text-muted">Projekttitel *</label>
          <input name="title" value="{{ proj.title if proj else '' }}" required class="form-control bg-dark text-light border-secondary" placeholder="Mein tolles Projekt">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Jahr</label>
          <input name="year" value="{{ proj.year if proj else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="2024">
        </div>
        <div class="col-md-2 d-flex align-items-end pb-2">
          <div class="form-check">
            <input type="checkbox" name="featured" id="featured" class="form-check-input" {% if proj and proj.featured %}checked{% endif %}>
            <label class="form-check-label text-muted" for="featured">Featured</label>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label text-muted">Beschreibung</label>
          <textarea name="description" rows="5" class="form-control bg-dark text-light border-secondary" placeholder="Was wurde gebaut, welche Herausforderungen, Ergebnis …">{{ proj.description if proj else '' }}</textarea>
        </div>
        <div class="col-md-5">
          <label class="form-label text-muted">Live-URL / Demo</label>
          <input name="url" value="{{ proj.url if proj else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="https://meinprojekt.de">
        </div>
        <div class="col-md-5">
          <label class="form-label text-muted">GitHub-URL</label>
          <input name="github_url" value="{{ proj.github_url if proj else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="https://github.com/…">
        </div>
        <div class="col-md-8">
          <label class="form-label text-muted">Vorschaubild-URL</label>
          <input name="image_url" value="{{ proj.image_url if proj else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="https://… oder /static/img/…">
        </div>
        <div class="col-md-8">
          <label class="form-label text-muted">Technologien (kommagetrennt)</label>
          <input name="technologies" value="{{ proj.technologies if proj else '' }}" class="form-control bg-dark text-light border-secondary" placeholder="Python, Flask, Vue.js, Docker">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Reihenfolge</label>
          <input name="order_idx" type="number" value="{{ proj.order_idx if proj else 0 }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Speichern</button>
          <a href="{{ url_for('admin.cv_dashboard') }}#projects" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
