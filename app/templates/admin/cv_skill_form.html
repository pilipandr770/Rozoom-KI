{% extends 'admin/base.html' %}
{% block title %}Skill bearbeiten — CV{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
  <h1 class="h4 text-light">Skill bearbeiten</h1>
  <a href="{{ url_for('admin.cv_dashboard') }}#skills" class="btn btn-outline-secondary btn-sm">← Zurück</a>
</div>
<div class="content-card">
  <div class="card-body">
    <form method="post">
      {{ csrf_field() }}
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label text-muted">Name *</label>
          <input name="name" value="{{ skill.name }}" required class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-3">
          <label class="form-label text-muted">Kategorie</label>
          <input name="category" value="{{ skill.category }}" class="form-control bg-dark text-light border-secondary" placeholder="Backend / Frontend …">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Level % (0-100)</label>
          <input name="level" type="number" min="0" max="100" value="{{ skill.level }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-md-2">
          <label class="form-label text-muted">Label</label>
          <input name="level_label" value="{{ skill.level_label }}" class="form-control bg-dark text-light border-secondary" placeholder="Expert">
        </div>
        <div class="col-md-1">
          <label class="form-label text-muted">Reihenf.</label>
          <input name="order_idx" type="number" value="{{ skill.order_idx }}" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Speichern</button>
          <a href="{{ url_for('admin.cv_dashboard') }}#skills" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
